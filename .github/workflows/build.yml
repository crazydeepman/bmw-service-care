name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Pod Install
        run: cd src && pod install --repo-update

      - name: Build Archive
        run: |
          cd src
          xcodebuild \
            -workspace "BMW Service.xcworkspace" \
            -scheme "BMW Service" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ../build/BMW.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Find App and Create IPA
        run: |
          echo "=== محتوى مجلد البناء ==="
          find build/ -name "*.app" -type d
          
          APP_PATH=$(find build/ -name "*.app" -type d | head -1)
          echo "مسار التطبيق: $APP_PATH"
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r BMW-Service-Care.ipa Payload/
          echo "✅ تم إنشاء IPA بنجاح"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BMW-Service-Care
          path: BMW-Service-Care.ipa
